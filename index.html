<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f1f5f9;--card:#fff;--border:#e2e8f0;--text:#1e293b;--muted:#64748b;--blue:#2563eb;--green:#16a34a;--red:#dc2626;--amber:#d97706;--purple:#7c3aed;--blue-light:#eff6ff;--green-light:#f0fdf4;--red-light:#fef2f2;--amber-light:#fffbeb;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:14px;min-height:100vh}
#app-header{background:var(--blue);color:#fff;padding:0 20px;display:flex;align-items:center;gap:24px;height:52px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.15)}
#app-header h1{font-size:17px;font-weight:700;white-space:nowrap}
.nav-tabs{display:flex;gap:4px;flex:1}
.nav-tab{padding:6px 14px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:500;color:rgba(255,255,255,.75);border:none;background:none;transition:.15s}
.nav-tab:hover{background:rgba(255,255,255,.15);color:#fff}
.nav-tab.active{background:rgba(255,255,255,.2);color:#fff}
#main{padding:20px;max-width:1400px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.card-title{font-size:13px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px}
.stat-label{font-size:12px;color:var(--muted);font-weight:500;margin-bottom:4px}
.stat-value{font-size:22px;font-weight:700}
.stat-sub{font-size:12px;color:var(--muted);margin-top:2px}
.text-green{color:var(--green)}.text-red{color:var(--red)}.text-blue{color:var(--blue)}.text-amber{color:var(--amber)}.text-purple{color:var(--purple)}
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:8px 10px;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;border-bottom:2px solid var(--border);background:#fafafa}
td{padding:7px 10px;border-bottom:1px solid var(--border)}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafafa}
.tr-total td{font-weight:700;background:#f8fafc!important;border-top:2px solid var(--border)}
.btn{padding:6px 12px;border-radius:6px;border:none;cursor:pointer;font-size:13px;font-weight:500;transition:.15s}
.btn-primary{background:var(--blue);color:#fff}.btn-primary:hover{background:#1d4ed8}
.btn-sm{padding:3px 8px;font-size:12px;border-radius:4px}
.btn-ghost{background:none;border:1px solid var(--border);color:var(--muted)}.btn-ghost:hover{background:var(--bg)}
.month-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.month-tab{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:var(--card);cursor:pointer;font-size:13px;font-weight:500;color:var(--muted);transition:.15s}
.month-tab:hover{border-color:var(--blue);color:var(--blue)}
.month-tab.active{background:var(--blue);color:#fff;border-color:var(--blue)}
.prog-bar{height:6px;background:#e2e8f0;border-radius:3px;overflow:hidden;margin-top:4px}
.prog-fill{height:100%;border-radius:3px;transition:.3s}
#modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;align-items:center;justify-content:center}
#modal-overlay.open{display:flex}
.modal{background:var(--card);border-radius:12px;padding:24px;width:480px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal h2{font-size:16px;font-weight:700;margin-bottom:16px}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:4px;text-transform:uppercase}
.form-group input:not([type=checkbox]):not([type=radio]),.form-group select{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:6px;font-size:14px;color:var(--text)}
.form-group input:focus,.form-group select:focus{outline:none;border-color:var(--blue)}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.editable{cursor:pointer;border-bottom:1px dashed var(--border)}
.editable:hover{border-bottom-color:var(--blue);color:var(--blue)}
.month-summary{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.ms-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px}
.ms-label{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase}
.ms-val{font-size:18px;font-weight:700;margin-top:2px}
.icon-btn{background:none;border:none;cursor:pointer;padding:2px 5px;color:var(--muted);border-radius:3px;font-size:13px}
.icon-btn:hover{color:var(--blue);background:var(--blue-light)}
.icon-btn.del:hover{color:var(--red);background:var(--red-light)}
.cat-pill{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;background:#f1f5f9;color:#475569;font-weight:500}
.month-cols{display:grid;grid-template-columns:1fr 380px;gap:16px;align-items:start}
.chart-wrap{position:relative;height:220px}
.sg-row{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px}
.sg-row:last-child{border-bottom:none}
.section-gap{margin-top:16px}
.tx-scroll{max-height:480px;overflow-y:auto;overflow-x:auto}
.view{display:none}.view.active{display:block}
.sp-input{border:none;background:transparent;width:100%;padding:3px 5px;border-radius:3px;font:inherit;font-size:13px;color:inherit;box-sizing:border-box;outline:none;}
.sp-input:focus{background:#eff6ff;outline:2px solid var(--blue);outline-offset:-1px;}
.sp-input::placeholder{color:#cbd5e1;font-style:italic;}
.sp-num{text-align:right;}
.sp-del{opacity:0;border:none;background:none;color:var(--red);cursor:pointer;font-size:15px;font-weight:700;padding:0 3px;line-height:1;transition:.1s;}
tr:hover .sp-del{opacity:.6;} tr:hover .sp-del:hover{opacity:1;}
@media(max-width:900px){.month-cols{grid-template-columns:1fr}.grid-4{grid-template-columns:1fr 1fr}.grid-2{grid-template-columns:1fr}}
@media(max-width:600px){
  #app-header{padding:0 10px;gap:6px;height:46px}
  #app-header h1{display:none}
  #user-email{display:none!important}
  .col-hide-sm{display:none}
  .nav-tab{padding:5px 9px;font-size:12px}
  #main{padding:10px}
  .card{padding:12px}
  .card-title{font-size:11px}
  .month-summary{grid-template-columns:1fr 1fr}
  .ms-val{font-size:15px}
  .ms-card{padding:10px}
  .grid-4{grid-template-columns:1fr 1fr}
  .stat-card{padding:12px}
  .stat-value{font-size:18px}
  .month-tabs{flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:4px;margin-bottom:12px;scrollbar-width:none}
  .month-tabs::-webkit-scrollbar{display:none}
  .month-tab{flex-shrink:0;padding:5px 10px;font-size:12px}
  table{font-size:12px}
  th{padding:5px 6px;font-size:10px}
  td{padding:4px 6px}
  .btn{font-size:12px;padding:5px 10px}
  .btn-sm{padding:3px 7px;font-size:11px}
  .modal{padding:16px;border-radius:8px}
  .ms-label{font-size:10px}
}
</style>
</head>

function updateTemplateBudgets(){
  const T=STATE.template;
  const txCats={};T.tx.forEach(t=>{if(t.cat)txCats[t.cat]=(txCats[t.cat]||0)+(t.amt||0);});
  let totalBud=0;
  document.querySelectorAll('.tmpl-bud-inp').forEach(inp=>{
    const cat=inp.dataset.cat;
    const bud=parseFloat(evalMath(inp.value))||0;
    totalBud+=bud;
    const tx=txCats[cat]||0;
    const row=inp.closest('[data-budcat]');if(!row)return;
    const remEl=row.querySelector('.tmpl-bud-rem');
    if(remEl){
      const rem=bud>0?bud-tx:null;
      const pct=bud>0?(tx/bud):0;
      remEl.textContent=bud>0?(rem>=-0.005?fmt(Math.max(0,rem))+' left':fmt(Math.abs(rem))+' over'):(tx>0?'no budget':'');
      remEl.style.color=rem===null?'var(--muted)':rem<-0.005?'var(--red)':pct>0.8?'var(--amber)':'var(--green)';
      // progress bar
      let pb=row.querySelector('.prog-bar');
      if(bud>0){
        const barPct=Math.min(100,pct*100),barColor=rem<-0.005?'var(--red)':pct>0.8?'var(--amber)':'var(--green)';
        if(!pb){pb=document.createElement('div');pb.className='prog-bar';const fill=document.createElement('div');fill.className='tmpl-bud-bar prog-fill';pb.appendChild(fill);row.appendChild(pb);}
        const fill=pb.querySelector('.tmpl-bud-bar');if(fill){fill.style.width=barPct+'%';fill.style.background=barColor;}
        row.style.cssText=`padding:8px 10px;background:#fafafa;border:1px solid var(--border);border-radius:8px;`;
      } else {
        if(pb)pb.remove();
        if(tx===0)row.style.cssText=`padding:8px 10px;background:transparent;border:1px solid transparent;border-radius:8px;opacity:.5;`;
      }
    }
  });
  const totalInc=T.inc.reduce((s,i)=>s+(i.amt||0),0);
  const totalGoals=T.savingGoals.reduce((s,g)=>s+(g.amount||0),0);
  const free=totalInc-totalBud-totalGoals;
  const el=document.getElementById('tmpl-sum-bud');if(el)el.textContent=fmt(totalBud);
  const fe=document.getElementById('tmpl-sum-free');if(fe){fe.textContent=fmt(free);fe.className=`ms-val ${free>=0?'text-green':'text-red'}`;}
}

function applyTemplate(){
  const month=document.getElementById('at-month').value;
  const copyTx=document.getElementById('at-tx').checked;
  const copyInc=document.getElementById('at-inc').checked;
  const copyGoals=document.getElementById('at-goals').checked;
  const copyBudgets=document.getElementById('at-budgets').checked;
  const T=STATE.template;
  if(!STATE.months[month])STATE.months[month]={tx:[],inc:[],budgets:{},savingGoals:[],savingsUsed:[]};
  const md=STATE.months[month];
  const today=new Date();const dd=String(today.getDate()).padStart(2,'0');
  if(copyTx)T.tx.forEach(t=>md.tx.push({...t,id:uid(),date:dd}));
  if(copyInc)T.inc.forEach(i=>md.inc.push({...i,id:uid(),date:dd}));
  if(copyGoals){
    T.savingGoals.forEach(g=>{
      md.savingGoals.push({...g,id:uid()});
      const fi=STATE.savingFunds.findIndex(f=>f.name===g.fund);
      if(fi>=0)STATE.savingFunds[fi].amount+=g.amount;
    });
  }
  if(copyBudgets)Object.assign(md.budgets,T.budgets);
  saveState();closeModal();
  switchMonth(month);showView('month');
}

function executeCopyMonth(){
  const src=document.getElementById('copy-src').value;
  const copyTx=document.getElementById('copy-tx').checked;
  const copyInc=document.getElementById('copy-inc').checked;
  const copyBudgets=document.getElementById('copy-budgets').checked;
  const copyGoals=document.getElementById('copy-goals').checked;
  const targets=[...document.querySelectorAll('.copy-target:checked')].map(c=>c.value);
  if(!targets.length){alert('Select at least one target month.');return;}
  const srcMd=STATE.months[src];
  for(const tgt of targets){
    const md=STATE.months[tgt];
    if(copyTx) md.tx=srcMd.tx.map(t=>({...t,id:uid(),date:''}));
    if(copyInc) md.inc=srcMd.inc.map(i=>({...i,id:uid(),date:''}));
    if(copyBudgets) md.budgets={...srcMd.budgets};
    if(copyGoals) md.savingGoals=srcMd.savingGoals.map(g=>({...g}));
  }
  saveState();closeModal();renderMonth();
}

function updateMonthSummaryBar(){
  const md=STATE.months[currentMonth];if(!md)return;
  const spent=sumTx(md.tx),earned=sumInc(md.inc);
  const savingTotal=md.savingGoals.reduce((s,g)=>s+g.amount,0);
  const usedTotal=(md.savingsUsed||[]).reduce((s,u)=>s+u.amount,0);
  const net=earned-spent,remaining=earned+usedTotal-spent-savingTotal;
  const cards=document.querySelectorAll('.ms-val');
  if(cards[0]){cards[0].textContent=fmt(spent);cards[0].className='ms-val text-red';}
  if(cards[1]){cards[1].textContent=fmt(earned);cards[1].className='ms-val text-green';}
  if(cards[2]){cards[2].textContent=fmt(net);cards[2].className=`ms-val ${net>=0?'text-green':'text-red'}`;}
  if(cards[3]){cards[3].innerHTML=`${fmt(remaining)}<span style="font-size:11px;color:var(--muted)"> after goals</span>`;cards[3].className=`ms-val ${remaining>=0?'text-green':'text-red'}`;}

  const totRow=document.querySelector('.inc-table .tr-total td:nth-child(4)');
  if(totRow)totRow.textContent=fmt(earned);

function renameBudgetCat(inp){
  const oldCat=inp.dataset.oldcat,newCat=inp.value.trim();
  if(!newCat){if(oldCat)inp.value=oldCat;return;}
  if(newCat===oldCat)return;
  const md=STATE.months[currentMonth];
  if(oldCat){
    if(md.budgets.hasOwnProperty(oldCat)){md.budgets[newCat]=md.budgets[oldCat];delete md.budgets[oldCat];}
    md.tx.forEach(t=>{if(t.cat===oldCat)t.cat=newCat;});
  } else {
    if(!md.budgets.hasOwnProperty(newCat))md.budgets[newCat]=0;
  }
  const row=inp.closest('.bud-row');
  if(row){
    row.dataset.cat=newCat;inp.dataset.oldcat=newCat;
    const budInp=row.querySelector('.bud-bud-inp');
    if(budInp){budInp.dataset.cat=newCat;saveBudgetRow(budInp);}
  }
  saveState();deferredRender();
}

function saveGoal(i){
  const name=document.getElementById('g-name').value.trim(),fund=document.getElementById('g-fund').value,amount=parseFloat(document.getElementById('g-amt').value)||0;
  if(!name)return;
  const goals=STATE.months[currentMonth].savingGoals;
  if(i>=0){
    // Reverse old fund deposit if it had one
    const old=goals[i];
    if(old.fund){const sf=STATE.savingFunds.find(f=>f.name===old.fund);if(sf)sf.amount=Math.max(0,sf.amount-old.amount);}
    goals[i]={name,fund,amount};
  } else {
    goals.push({id:uid(),name,fund,amount});
  }
  // Apply new fund deposit
  if(fund){const sf=STATE.savingFunds.find(f=>f.name===fund);if(sf)sf.amount+=amount;}
  saveState();closeModal();renderMonth();
}
function deleteGoal(i){
  if(!confirm('Delete this saving goal? The amount will be removed from the fund.'))return;
  const g=STATE.months[currentMonth].savingGoals[i];
  if(g.fund){const sf=STATE.savingFunds.find(f=>f.name===g.fund);if(sf)sf.amount=Math.max(0,sf.amount-g.amount);}
  STATE.months[currentMonth].savingGoals.splice(i,1);
  saveState();closeModal();renderMonth();
}

function saveSavingsUsed(){

  const desc=document.getElementById('su-desc').value.trim()||fund;
  const amount=parseFloat(document.getElementById('su-amt').value)||0;
  if(!amount)return;

function saveEditSavingsUsed(i){
  const md=STATE.months[currentMonth];
  const u=(md.savingsUsed||[])[i];if(!u)return;
  const newFund=document.getElementById('su-fund-e').value;
  const newDesc=document.getElementById('su-desc-e').value.trim()||newFund;
  const newAmount=parseFloat(document.getElementById('su-amt-e').value)||0;
  if(!newAmount)return;
  // Reverse old fund effect
  const oldSf=STATE.savingFunds.find(f=>f.name===u.fund);

  // Apply new fund effect
  const newSf=STATE.savingFunds.find(f=>f.name===newFund);

  u.fund=newFund;u.desc=newDesc;u.amount=newAmount;

}

async function importData(input){
  const file=input.files[0];
  input.value='';
  if(!file)return;
  let data;
  try{data=JSON.parse(await file.text());}
  catch(e){alert('Could not read that file — make sure it\'s a Family Fund JSON export.');return;}
  if(!data.months){alert('This doesn\'t look like a Family Fund backup file.');return;}
  if(!confirm('This will replace ALL current data with the imported file. Continue?'))return;
  STATE=data;
  _applyMigrations();
  try{
    await _DOC.set(JSON.parse(JSON.stringify(STATE)));
    if(currentView==='dashboard')renderDashboard();
    else if(currentView==='month')renderMonth();
    else renderAssets();
    alert('Import successful!');
  }catch(e){
    alert('Import failed — Firestore write error: '+e.message);
  }
}

// ── Realtime sync handler ─────────────────────────────────────
let _syncUnsub=null;
_auth.onAuthStateChanged(async user=>{
  const overlay=document.getElementById('auth-overlay');
  const loading=document.getElementById('auth-loading');
  const header=document.getElementById('app-header');
  const main=document.getElementById('main');
  if(user){
    if(!ALLOWED_EMAILS.includes(user.email)){
      await _auth.signOut();
      overlay.style.display='flex';
      const errEl=document.getElementById('auth-error');
      errEl.textContent='That Google account isn\'t authorized to access this app.';
      errEl.style.display='block';
      return;
    }
    overlay.style.display='none';
    loading.style.display='flex';
    // Load initial data
    let isFirstTime=false;
    try{
      const snap=await _DOC.get();
      if(snap.exists){
        STATE=snap.data();
      }else{
        STATE=_seedState();
        isFirstTime=true;
      }
    }catch(e){
      console.error('Load error — check Firestore rules:',e);
      STATE=_seedState();
      isFirstTime=true;
    }
    _applyMigrations();
    // First-time: persist seed data to Firestore (only attempt if read succeeded)
    if(isFirstTime){try{await _DOC.set(JSON.parse(JSON.stringify(STATE)));}catch(e){console.error('Initial save failed:',e);}}
    // Show app
    loading.style.display='none';
    header.style.display='flex';
    main.style.display='block';
    const emailEl=document.getElementById('user-email');
    emailEl.textContent=user.email;emailEl.style.display='';
    renderDashboard();
    // Subscribe for live updates from the other user
    if(_syncUnsub)_syncUnsub();
    _syncUnsub=_DOC.onSnapshot(snap=>{
      if(!snap.exists||_saveTimer)return; // don't clobber an active save
      const fresh=snap.data();
      if(JSON.stringify(fresh)===JSON.stringify(STATE))return; // no change
      STATE=fresh;_applyMigrations();
      if(currentView==='dashboard')renderDashboard();
      else if(currentView==='month')renderMonth();
      else if(currentView==='assets')renderAssets();
    });
  }else{
    if(_syncUnsub){_syncUnsub();_syncUnsub=null;}
    header.style.display='none';
    main.style.display='none';
    overlay.style.display='flex';
    document.getElementById('auth-btn').textContent='Sign In';
    document.getElementById('auth-btn').disabled=false;
  }
});
